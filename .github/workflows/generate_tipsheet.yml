name: Generate NRL Tip Sheet

on:
  # Runs every Monday at 10pm UTC = Tuesday 8am AEST (after the weekend round, before the next)
  schedule:
    - cron: "0 22 * * 1"

  # Also lets you trigger it manually from GitHub → Actions tab (works from your phone)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate tip sheet
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python nrl_tipsheet.py

      - name: Commit and push updated tip sheet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tipsheet_output.html
          git diff --staged --quiet || git commit -m "chore: regenerate NRL tip sheet $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload tipsheet as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
