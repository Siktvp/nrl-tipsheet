name: Record Round Results

on:
  workflow_dispatch:
    inputs:
      round_id:
        description: "Round ID (e.g. 2026-R08)"
        required: true
        type: string
      results:
        description: |
          Comma-separated results — TeamName:W or TeamName:L
          Example: Broncos:W,Raiders:L,Storm:W,Panthers:W,Cowboys:W,Bulldogs:L,Sea Eagles:W,Titans:L
          Tip: short nicknames work fine (Broncos not Brisbane Broncos)
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  record:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Record results
        env:
          ROUND_ID: ${{ inputs.round_id }}
          RESULTS_STR: ${{ inputs.results }}
        run: python record_results_action.py

      - name: Regenerate dashboard
        run: python generate_dashboard.py

      - name: Commit results and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history_db.json dashboard.html
          git diff --staged --quiet || git commit -m "chore: record results ${{ inputs.round_id }}"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
